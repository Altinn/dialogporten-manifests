name: Pull Request

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pull-request-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate kustomize
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0

      - name: Validate kustomize structure
        shell: bash
        run: |
          set -euo pipefail

          for dir in ./environments/*/; do
            env=$(basename "$dir")
            if [ ! -f "./environments/${env}/kustomization.yaml" ]; then
              echo "Error: Missing ./environments/${env}/kustomization.yaml"
              exit 1
            fi
            if [ ! -f "./manifests/environments/${env}/kustomization.yaml" ]; then
              echo "Error: Missing ./manifests/environments/${env}/kustomization.yaml"
              exit 1
            fi
            if [ ! -f "./flux-system/${env}/kustomization.yaml" ]; then
              echo "Error: Missing ./flux-system/${env}/kustomization.yaml"
              exit 1
            fi
          done

          for dir in ./manifests/apps/*/ ./manifests/jobs/*/; do
            if [ ! -f "${dir}base/kustomization.yaml" ]; then
              echo "Error: Missing ${dir}base/kustomization.yaml"
              exit 1
            fi
          done

          if grep -R --include='kustomization.yaml' -n 'patchesStrategicMerge' ./manifests/environments; then
            echo "Error: Found deprecated patchesStrategicMerge usage."
            exit 1
          fi

  kustomize-diff:
    uses: dis-way/.github/.github/workflows/kustomize-diff.yml@arealmaas/dublin
    with:
      build-paths: "environments/*,flux/syncroot/*,flux-system/*"
    permissions:
      contents: read
      pull-requests: write
