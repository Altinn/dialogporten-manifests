apiVersion: apps/v1
kind: Deployment
metadata:
  name: graphql
  labels:
    app.kubernetes.io/name: graphql
    app.kubernetes.io/part-of: dialogporten
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: graphql
  template:
    metadata:
      labels:
        app.kubernetes.io/name: graphql
        app.kubernetes.io/part-of: dialogporten
        azure.workload.identity/use: "true"
      annotations:
        cluster-autoscaler.kubernetes.io/safe-to-evict: "true"
        linkerd.io/inject: enabled
    spec:
      serviceAccountName: graphql
      containers:
        - name: graphql
          image: ghcr.io/altinn/dialogporten-graphql:set-by-ci
          envFrom:
            - configMapRef:
                name: graphql-runtime
          env:
            - name: Infrastructure__DialogDbConnectionString
              valueFrom:
                secretKeyRef:
                  name: graphql-secrets
                  key: dialogportenAdoConnectionString
            - name: Infrastructure__Redis__ConnectionString
              valueFrom:
                secretKeyRef:
                  name: graphql-secrets
                  key: dialogportenRedisConnectionString
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.monitoring.svc.cluster.local:4317
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: grpc
            - name: OTEL_SERVICE_NAME
              value: dialogporten-graphql
            - name: POD_UID
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.uid
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "k8s.pod.uid=$(POD_UID)"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: graphql-runtime
  labels:
    app.kubernetes.io/name: graphql
    app.kubernetes.io/part-of: dialogporten
data:
  DIALOGPORTEN_ENVIRONMENT: set-by-env
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: graphql-secrets
  labels:
    app.kubernetes.io/name: graphql
    app.kubernetes.io/part-of: dialogporten
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: dialogporten-azure-kv
  target:
    name: graphql-secrets
    creationPolicy: Owner
  data:
    - secretKey: dialogportenAdoConnectionString
      remoteRef:
        key: dialogportenAdoConnectionString
    - secretKey: dialogportenRedisConnectionString
      remoteRef:
        key: dialogportenRedisConnectionString
---
apiVersion: v1
kind: Service
metadata:
  name: graphql
  labels:
    app.kubernetes.io/name: graphql
    app.kubernetes.io/part-of: dialogporten
spec:
  selector:
    app.kubernetes.io/name: graphql
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: graphql
  labels:
    app.kubernetes.io/name: graphql
    app.kubernetes.io/part-of: dialogporten
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: traefik-gateway
    namespace: traefik   
  rules:
  - backendRefs:
    - group: ""
      kind: Service
      name: graphql
      port: 80
    filters:
    - requestHeaderModifier:
        set:
        - name: l5d-dst-override
          value: graphql.product-dialogporten.svc.cluster.local:80
      type: RequestHeaderModifier
    matches:
    - path:
        type: PathPrefix
        value: /dialogporten/graphql
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: graphql
  labels:
    app.kubernetes.io/name: graphql
    app.kubernetes.io/part-of: dialogporten
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: graphql
  maxReplicas: 2
---
apiVersion: application.dis.altinn.cloud/v1alpha1
kind: ApplicationIdentity
metadata:
  name: graphql
  labels:
    app.kubernetes.io/name: graphql
    app.kubernetes.io/part-of: dialogporten
spec: {}
