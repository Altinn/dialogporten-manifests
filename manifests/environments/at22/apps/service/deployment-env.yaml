apiVersion: apps/v1
kind: Deployment
metadata:
  name: service
spec:
  template:
    spec:
      containers:
        - name: service
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: test
            - name: OTEL_TRACES_SAMPLER_ARG
              value: "1"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: service-runtime
  labels:
    app.kubernetes.io/instance: at22
data:
  DIALOGPORTEN_ENVIRONMENT: test
  AZURE_APPCONFIG_URI: https://dp-be-test-appconfiguration-i7se3jtjey3lo.azconfig.io
  Infrastructure__MassTransit__Host: sb://dp-be-test-service-bus-i7se3jtjey3lo.servicebus.windows.net/
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: service-secrets
  labels:
    app.kubernetes.io/instance: at22
