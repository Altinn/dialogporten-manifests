apiVersion: apps/v1
kind: Deployment
metadata:
  name: service
spec:
  template:
    spec:
      containers:
        - name: service
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: staging
            - name: OTEL_TRACES_SAMPLER_ARG
              value: "1"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: service-runtime
  labels:
    app.kubernetes.io/instance: tt02
data:
  DIALOGPORTEN_ENVIRONMENT: staging
  AZURE_APPCONFIG_URI: https://dp-be-staging-appconfiguration-ryymdlozopam2.azconfig.io
  Infrastructure__MassTransit__Host: sb://dp-be-staging-service-bus-ryymdlozopam2.servicebus.windows.net/
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: service-secrets
  labels:
    app.kubernetes.io/instance: tt02
