apiVersion: batch/v1
kind: CronJob
metadata:
  name: web-api-migration-job
  labels:
    app.kubernetes.io/name: web-api-migration-job
    app.kubernetes.io/part-of: dialogporten
spec:
  schedule: "0 0 1 1 *"
  suspend: true
  # Prevent retroactive runs if someone temporarily unsuspends the CronJob.
  # On-demand execution should be done by creating a Job from this template.
  startingDeadlineSeconds: 60
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      activeDeadlineSeconds: 86400
      template:
        metadata:
          labels:
            app.kubernetes.io/name: web-api-migration-job
            app.kubernetes.io/part-of: dialogporten
        spec:
          restartPolicy: Never
          serviceAccountName: web-api-migration-job
          containers:
            - name: web-api-migration-job
              image: ghcr.io/altinn/dialogporten-migration-bundle:set-by-ci
              env:
                - name: Infrastructure__DialogDbConnectionString
                  valueFrom:
                    secretKeyRef:
                      name: dialogporten-secrets
                      key: dialogportenAdoConnectionString
                - name: OTEL_EXPORTER_OTLP_ENDPOINT
                  value: http://otel-collector.monitoring.svc.cluster.local:4317
                - name: OTEL_EXPORTER_OTLP_PROTOCOL
                  value: grpc
                - name: OTEL_SERVICE_NAME
                  value: dialogporten-web-api-migration-job
                - name: POD_UID
                  valueFrom:
                    fieldRef:
                      apiVersion: v1
                      fieldPath: metadata.uid
                - name: OTEL_RESOURCE_ATTRIBUTES
                  value: "k8s.pod.uid=$(POD_UID)"
